version: '3.8'

services:
  assistant:
    build: .
    container_name: it-support-assistant

    ports:
      - "8000:8000"

    env_file:
      - .env

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./kb.json:/app/kb.json:ro
      - ./dataset.jsonl:/app/dataset.jsonl:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
